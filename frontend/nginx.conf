server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path serves index.html so Vue Router (if
    # added later) can handle client-side routes instead of getting a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
